@let selectedProduct = product()!;

@if (selectedProduct) {
  <div>
    <p>
      You selected: <strong>{{ productTitle }}</strong>
    </p>

    <p>{{ selectedProduct.price | currency: 'EUR'}}</p>
    <div class="pill-group">
      @for (category of selectedProduct.categories | keyvalue; track category.key) {
        <p class="pill">{{ category.value | lowercase}}</p>
      }
    </div>
    <button type="button" (click)="addToCart()">Add to cart</button>
  </div>
}
