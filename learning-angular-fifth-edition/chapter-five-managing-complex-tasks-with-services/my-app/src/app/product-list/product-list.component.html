@if (products.length > 0) {
<h1>Products ({{ products.length }})</h1>
}

<ul class="pill-group">
  @for (product of products | sort:'price'; track product.id; let i = $index) {
    <li class="pill" (click)="selecetedProduct = product">
      <app-product-view [id]="product.id"></app-product-view>
    </li>
  } @empty {
    <p>No products</p>
  }
</ul>

<h1>Favorites</h1>
<app-favorites></app-favorites>

<app-product-detail
  #productDetail
  [product]="selecetedProduct"
  (added)="onAdded($event)"
></app-product-detail>
